name: MLB Daily Sniper Auto-Pilot

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-mlb-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy xgboost scikit-learn requests pybaseball

    - name: Run Daily Bets Engine
      run: |
        python daily_bets.py --auto

    - name: Send Dashboard to Discord
      run: |
        curl -F "file1=@betting_dashboard_report.txt" "https://discord.com/api/webhooks/1487199773256585239/Ci6G7sxUSvvlNPVdT2ng4CpbtTn69t0u7bVn9AupakQa5YYMoZkk7t3GuhnyM4BCWZov"

    - name: Save Updated Ledger to Cloud
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add prediction_ledger.csv betting_dashboard_report.txt
        git commit -m "Automated ledger update [skip ci]" || echo "No changes to commit"
        git push