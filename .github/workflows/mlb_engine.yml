name: MLB Daily Sniper Auto-Pilot

on:
  schedule:
    # This runs at 13:00 UTC every day, which is 9:00 AM Eastern Time
    - cron: '0 13 * * *'
  workflow_dispatch: # This adds a "Run Now" button on the GitHub website so you can test it

permissions:
  contents: write # Allows the bot to save your updated prediction_ledger.csv

jobs:
  run-mlb-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # The most stable version for machine learning libraries

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy xgboost scikit-learn requests pybaseball

    - name: Run Daily Bets Engine
      run: |
        python daily_bets.py --auto

    - name: Save Updated Ledger to Cloud
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add prediction_ledger.csv betting_dashboard_report.txt
        git commit -m "Automated ledger update [skip ci]" || echo "No changes to commit"
        git push